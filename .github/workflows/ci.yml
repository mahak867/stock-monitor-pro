name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test
        env:
          # Clerk requires a publishable key to initialise; a dummy value is
          # sufficient for the unit-test suite which does not exercise auth flows.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
